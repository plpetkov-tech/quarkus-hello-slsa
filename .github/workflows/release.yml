name: Build, Attest & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write        # upload release assets
  packages: write        # push container image
  id-token: write        # OIDC token for Sigstore keyless signing
  attestations: write    # GitHub native attestations

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # ── Build ────────────────────────────────────────────
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests \
            -Dquarkus.container-image.build=false

      # ── Container Image ─────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Build & push container image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── Install supply chain tools ──────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install bnd
        uses: carabiner-dev/actions/install/bnd@HEAD

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      # ── Sign container image (Sigstore keyless) ─────────
      - name: Sign container image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

      # ── SBOM (syft → CycloneDX) ─────────────────────────
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.json

      # ── Vulnerability scan (Trivy) ──────────────────────
      - name: Trivy vulnerability scan
        run: |
          trivy image --severity CRITICAL,HIGH,MEDIUM,LOW --exit-code 0 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

      - name: Trivy scan (JSON for attestation)
        run: |
          trivy image --format json --output trivy-results.json --exit-code 0 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

      # ── Wrap as attestations with bnd, sign, package ────
      - name: Attest SBOM (bnd)
        run: |
          mkdir -p attestations
          bnd predicate sbom.json \
            --subject="${{ steps.push.outputs.digest }}" \
            --type="https://cyclonedx.org/bom/v1.6" \
            --out attestations/sbom.bundle.json

      - name: Attest vulnerability scan (bnd)
        run: |
          bnd predicate trivy-results.json \
            --subject="${{ steps.push.outputs.digest }}" \
            --type="https://trivy.dev/report" \
            --out attestations/trivy.bundle.json

      - name: Pack attestation bundle
        run: |
          bnd pack attestations/ > attestations.jsonl
          bnd inspect attestations.jsonl

      # ── Verify with AMPEL ───────────────────────────────
      - name: Verify attestations (AMPEL)
        uses: carabiner-dev/actions/ampel/verify@HEAD
        with:
          subject: "${{ steps.push.outputs.digest }}"
          collector: "jsonl:attestations.jsonl"
          policy: ".github/policies/release.hjson"
          attest: true
          fail: "false"

      # ── Also attach to OCI registry via cosign ──────────
      - name: Attest SBOM (cosign → registry)
        run: |
          cosign attest --yes \
            --type cyclonedx \
            --predicate sbom.json \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

      - name: Attest vulnerability scan (cosign → registry)
        run: |
          cosign attest --yes \
            --type vuln \
            --predicate trivy-results.json \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

      # ── GitHub native attestation (provenance) ──────────
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # ── Upload artifacts ────────────────────────────────
      - name: Upload attestation bundle
        uses: actions/upload-artifact@v4
        with:
          name: attestations
          path: |
            attestations.jsonl
            sbom.json
            trivy-results.json

  # ── SLSA Provenance (Level 3) ─────────────────────────
  provenance:
    needs: build
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/${{ github.repository }}
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
